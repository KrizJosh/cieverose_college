<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cieverose College</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f2b4b 0%, #1a4b7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .login-logo { 
            font-size: 3.5rem; 
            color: #f5b342; 
            margin-bottom: 0.5rem; 
        }
        h2 { color: #0f2b4b; margin-bottom: 0.3rem; font-size: 1.8rem; }
        .subtitle { color: #4a5b6e; margin-bottom: 2rem; font-size: 0.95rem; }
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .form-group label { 
            font-weight: 600; 
            color: #0f2b4b; 
            display: block; 
            margin-bottom: 4px; 
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%; 
            padding: 0.8rem 1rem; 
            border-radius: 10px; 
            border: 1px solid #dce3ed;
            font-size: 0.95rem; 
            transition: 0.3s;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #f5b342; 
            box-shadow: 0 0 0 3px rgba(245,179,66,0.15); 
        }
        .login-btn {
            background: #f5b342; 
            color: #0f2b4b; 
            border: none;
            padding: 0.9rem 2rem; 
            border-radius: 60px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover { 
            background: #ffd966; 
            transform: scale(1.02); 
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        #loginError { 
            color: #e74c3c; 
            font-size: 0.85rem; 
            margin-top: 0.5rem; 
            display: none; 
            padding: 0.5rem;
            background: #fde8e8;
            border-radius: 8px;
        }
        .demo-creds { 
            margin-top: 1.5rem; 
            font-size: 0.8rem; 
            color: #4a5b6e; 
            background: #f8fafc; 
            padding: 0.8rem; 
            border-radius: 8px;
            border: 1px solid #e9edf4;
        }
        .demo-creds strong { color: #0f2b4b; }
        .demo-creds span { display: block; margin: 2px 0; }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: #27ae60; }
        .status-dot.offline { background: #e74c3c; }
        .db-status {
            margin-top: 1rem;
            font-size: 0.8rem;
            padding: 0.5rem;
            border-radius: 8px;
            background: #f8fafc;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0f2b4b;
            color: white;
            padding: 1rem 1.8rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border-left: 4px solid #f5b342;
            transform: translateY(120px);
            opacity: 0;
            transition: 0.4s;
            z-index: 999;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast i { margin-right: 10px; color: #f5b342; }
    </style>

</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-logo"><i class="fas fa-graduation-cap"></i></div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to access your dashboard</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" value="admin@cieverose.edu" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" value="password123" required>
        </div>
        <div id="loginError"></div>
        <button type="submit" class="login-btn" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </form>

    <div class="demo-creds">
        <strong>👤 Test Accounts:</strong>
        <span>👑 Admin: admin@cieverose.edu / password123</span>
        <span>👨‍🏫 Teacher: teacher@cieverose.edu / password123</span>
        <span>🎓 Student: student@cieverose.edu / password123</span>
    </div>

    <div class="db-status" id="dbStatus">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusText">Checking database connection...</span>
    </div>
        </div>
    </div>

    <!-- Dashboard (hidden until login) -->
    <div id="dashboardScreen" style="display:none;">
        <h1>Welcome to Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use a unique variable name
        const SUPABASE_URL = 'postgresql://postgres:fkyj65KnCvE0Ax7I@db.dhbvsupllbxhyhtwvfcb.supabase.co:5432/postgres'; // https://dhbvsupllbxhyhtwvfcb.supabase.co
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoYnZzdXBsbGJ4aHlodHd2ZmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzAwNzksImV4cCI6MjA5ODQ0NjA3OX0.aSCa06KYO9B89xJ2PNDcUs7fmfl6P3J5Z1CFGE4tYP8'; // REPLACE WITH YOUR ANON KEY
        
        // Create client with a unique name
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ... rest of your code using 'sb' instead of 'supabase' ...
		
    // ===== DOM REFS =====
    const lockScreen = document.getElementById('lockScreen');
    const mainApp = document.getElementById('mainApp');
    const loginForm = document.getElementById('loginFormLock');
    const loginError = document.getElementById('loginError');

    // ===== CHECK SESSION ON LOAD =====
    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            showApp();
        } else {
            lockScreen.classList.remove('hidden');
            mainApp.classList.remove('visible');
        }
    }

    // ===== LOGIN =====
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmailLock').value.trim();
        const password = document.getElementById('loginPasswordLock').value.trim();
        loginError.style.display = 'none';

        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            loginError.textContent = error.message || 'Invalid credentials.';
            loginError.style.display = 'block';
            return;
        }
        if (data.session) {
            showApp();
            showToast('✅ Login successful!', true);
        }
    });

    // ===== LOGOUT =====
    window.handleLogout = async function() {
        await sb.auth.signOut();
        lockScreen.classList.remove('hidden');
        mainApp.classList.remove('visible');
        showToast('👋 Logged out.', true);
    };

    // ===== SHOW APP =====
    function showApp() {
        lockScreen.classList.add('hidden');
        mainApp.classList.add('visible');
        // Initialize app content
        renderCourses();
        initTabs();
        initPageSwitching();
    }

    // ===== COURSES DATA =====
    const coursesData = [
        { id: 1, title: 'ICT 101 – Programming', icon: 'fa-code', badge: 'ICT', students: 32, schedule: 'MWF 10:00', desc: 'Python, Java, problem-solving.', progress: '8/12 modules', instructor: 'Teacher' },
        { id: 2, title: 'HE 201 – Cookery & Baking', icon: 'fa-utensils', badge: 'HE', students: 28, schedule: 'TTh 1:30', desc: 'Pastry, bread, food service.', progress: '5/8 modules', instructor: 'Chef Maria' },
        { id: 3, title: 'ABM 301 – Business Finance', icon: 'fa-chart-line', badge: 'ABM', students: 26, schedule: 'MWF 2:00', desc: 'Financial analysis, budgeting.', progress: '10/12 modules', instructor: 'Mr. Reyes' },
    ];

    function renderCourses() {
        const grid = document.getElementById('courseGrid');
        let html = '';
        coursesData.forEach(c => {
            html += `
                <div class="course-card">
                    <div class="course-top"><span class="icon"><i class="fas ${c.icon}"></i></span><span class="badge">${c.badge}</span></div>
                    <h4>${c.title}</h4>
                    <div class="course-sub"><i class="fas fa-university"></i> ${c.instructor}</div>
                    <div class="course-meta"><span><i class="fas fa-user"></i> ${c.students} students</span><span><i class="far fa-clock"></i> ${c.schedule}</span></div>
                    <div class="course-desc">${c.desc}</div>
                    <div class="course-footer"><span class="progress-info"><i class="fas fa-check-circle"></i> ${c.progress}</span><button class="btn-manage" onclick="showDemoModal('📖 Manage Course', 'Manage ${c.title}')">Manage</button></div>
                </div>
            `;
        });
        html += `<div class="add-card" onclick="showDemoModal('➕ Create Course', 'Create a new course.')"><i class="fas fa-plus-circle"></i><h4>Add New Course</h4></div>`;
        grid.innerHTML = html;
    }

    // ===== TABS =====
    function initTabs() {
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = {
            mycourses: document.getElementById('tab-mycourses'),
            students: document.getElementById('tab-students'),
            gradebook: document.getElementById('tab-gradebook'),
            messages: document.getElementById('tab-messages')
        };
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                Object.values(tabContents).forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                const tabId = this.dataset.tab;
                if (tabContents[tabId]) tabContents[tabId].classList.add('active');
            });
        });
    }

    // ===== PAGE SWITCHING =====
    function initPageSwitching() {
        document.querySelectorAll('.nav-links a[data-page]').forEach(el => {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                const pageId = this.dataset.page;
                document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
                const target = document.getElementById('page-' + pageId);
                if (target) target.classList.add('active');
                document.querySelectorAll('.nav-links a[data-page]').forEach(a => a.classList.remove('active'));
                this.classList.add('active');
            });
        });
        document.querySelectorAll('.footer a[data-page]').forEach(el => {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                const pageId = this.dataset.page;
                document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
                const target = document.getElementById('page-' + pageId);
                if (target) target.classList.add('active');
                document.querySelectorAll('.nav-links a[data-page]').forEach(a => a.classList.remove('active'));
                document.querySelector(`.nav-links a[data-page="${pageId}"]`)?.classList.add('active');
            });
        });
    }

    // ===== FLYOUT =====
    window.toggleFlyout = function() {
        const menu = document.getElementById('flyoutMenu');
        const overlay = document.getElementById('flyoutOverlay');
        menu.classList.toggle('open');
        overlay.classList.toggle('active');
    };

    // ===== SETTINGS =====
    window.saveSettingsFlyout = function() {
        const theme = document.getElementById('themeSelectFlyout').value;
        localStorage.setItem('cieverose_theme', theme);
        if (theme === 'dark') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
        showToast('✅ Settings saved!', true);
        toggleFlyout();
    };
    window.resetSettingsFlyout = function() {
        document.getElementById('themeSelectFlyout').value = 'light';
        localStorage.removeItem('cieverose_theme');
        document.body.classList.remove('dark-mode');
        showToast('🔄 Reset to default', true);
        toggleFlyout();
    };
    // Load theme
    (function loadTheme() {
        const theme = localStorage.getItem('cieverose_theme') || 'light';
        if (theme === 'dark') document.body.classList.add('dark-mode');
        document.getElementById('themeSelectFlyout').value = theme;
    })();

    // ===== DEMO MODAL =====
    window.showDemoModal = function(title, message) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message || 'Demo feature.';
        document.getElementById('demoModal').classList.add('active');
    };
    window.closeDemoModal = function() {
        document.getElementById('demoModal').classList.remove('active');
    };

    // ===== TOAST =====
    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.className = 'toast show';
        toast.style.borderLeftColor = isSuccess ? '#27ae60' : '#e74c3c';
        toast.querySelector('i').className = isSuccess ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== ENROLLMENT FORM =====
    window.handleEnrollment = function(e) {
        e.preventDefault();
        const name = document.getElementById('studentName').value;
        const email = document.getElementById('studentEmail').value;
        const course = document.getElementById('studentCourse').value;
        if (name && email && course) {
            const tbody = document.getElementById('enrolledStudentsBody');
            const row = document.createElement('tr');
            row.innerHTML = `<td>${tbody.children.length + 1}</td><td>${name}</td><td>${email}</td><td>${course}</td><td>Active</td>`;
            tbody.appendChild(row);
            showToast(`✅ Enrolled ${name} in ${course}`, true);
            document.getElementById('enrollmentForm').reset();
        }
    };

    // ===== STUDENT SEARCH =====
    document.getElementById('studentSearch')?.addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('#studentTableBody tr').forEach(row => {
            const name = row.querySelector('td')?.textContent?.toLowerCase() || '';
            row.style.display = name.includes(q) ? '' : 'none';
        });
    });

    // ===== INIT =====
    checkSession();

    // Expose for inline onclick
    window.handleLogout = handleLogout;
    window.toggleFlyout = toggleFlyout;
    window.showDemoModal = showDemoModal;
    window.closeDemoModal = closeDemoModal;
    window.saveSettingsFlyout = saveSettingsFlyout;
    window.resetSettingsFlyout = resetSettingsFlyout;
    window.handleEnrollment = handleEnrollment;
    </script>
</body>
</html>
