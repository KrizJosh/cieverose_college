<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <!-- Font Awesome (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
      padding: 1.5rem;
      margin: 0;
      /* subtle animated background pattern */
      position: relative;
    }

    /* animated background circles (pure CSS) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.03) 0%, transparent 25%),
                        radial-gradient(circle at 80% 70%, rgba(46, 204, 113, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 40% 80%, rgba(155, 89, 182, 0.02) 0%, transparent 35%);
      background-size: 100% 100%;
      animation: drift 18s infinite alternate ease-in-out;
    }

    @keyframes drift {
      0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
      100% { transform: scale(1.2) rotate(3deg); opacity: 1; }
    }

    .maintenance-card {
      position: relative;
      z-index: 10;
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.75);
      border-radius: 3rem 3rem 3rem 3rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 
                  0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      padding: 3rem 2.5rem;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* icon with gear and spinner */
    .icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(52, 152, 219, 0.08);
      border-radius: 50%;
      width: 120px;
      height: 120px;
      margin-bottom: 1.8rem;
      position: relative;
      transition: transform 0.3s ease;
      border: 1px solid rgba(52, 152, 219, 0.1);
    }

    .icon-wrapper i {
      font-size: 5rem;
      color: #2c7cb0;
      filter: drop-shadow(0 4px 8px rgba(44, 124, 176, 0.2));
    }

    /* spinning gear (only the gear icon) */
    .fa-cog {
      animation: spin 6s infinite linear;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* small decorative dots around icon */
    .icon-wrapper::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px dashed rgba(44, 124, 176, 0.15);
      animation: spin 30s infinite linear;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a2a3a;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    h1 .highlight {
      background: linear-gradient(135deg, #2c7cb0, #3b9bd7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    .sub-message {
      font-size: 1.2rem;
      color: #2c3e50;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
      font-weight: 450;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #2d4055;
      max-width: 480px;
      margin: 0 auto 2rem;
      opacity: 0.9;
      font-weight: 400;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #eaf4eb;
      padding: 0.5rem 1.6rem 0.5rem 1.2rem;
      border-radius: 60px;
      color: #1f6d3b;
      font-weight: 500;
      font-size: 0.95rem;
      border: 1px solid rgba(46, 204, 113, 0.2);
      margin-bottom: 2.2rem;
    }

    .status-badge i {
      font-size: 0.9rem;
      color: #27ae60;
    }

    .progress-track {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin: 1.8rem 0 1.2rem;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      background: #bdd8e8;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .progress-dot.active {
      background: #2c7cb0;
      box-shadow: 0 0 0 3px rgba(44, 124, 176, 0.2);
    }

    .progress-dot:nth-child(1) { animation: pulse-dot 1.6s infinite 0s; }
    .progress-dot:nth-child(2) { animation: pulse-dot 1.6s infinite 0.3s; }
    .progress-dot:nth-child(3) { animation: pulse-dot 1.6s infinite 0.6s; }
    .progress-dot:nth-child(4) { animation: pulse-dot 1.6s infinite 0.9s; }
    .progress-dot:nth-child(5) { animation: pulse-dot 1.6s infinite 1.2s; }

    @keyframes pulse-dot {
      0%, 100% { background: #bdd8e8; transform: scale(1); }
      50% { background: #2c7cb0; transform: scale(1.3); }
    }

    .notice {
      font-size: 0.95rem;
      color: #4a5f73;
      background: rgba(255, 255, 255, 0.5);
      padding: 0.7rem 1.2rem;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .notice i {
      margin-right: 6px;
      color: #3b9bd7;
    }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: #5b6f82;
      border-top: 1px solid rgba(0,0,0,0.03);
      padding-top: 1.8rem;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .footer-note span {
      background: rgba(255,255,255,0.3);
      padding: 0.2rem 1.2rem;
      border-radius: 30px;
      backdrop-filter: blur(2px);
    }

    .footer-note i {
      margin-right: 6px;
      opacity: 0.7;
    }

    /* responsive */
    @media (max-width: 480px) {
      .maintenance-card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 2.1rem;
      }
      .icon-wrapper {
        width: 100px;
        height: 100px;
      }
      .icon-wrapper i {
        font-size: 4rem;
      }
      .sub-message {
        font-size: 1rem;
        padding: 0.4rem 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="maintenance-card">
    <!-- icon with spinning gear -->
    <div class="icon-wrapper">
      <i class="fas fa-cog"></i>
    </div>

    <h1>
      <span>🚧</span>
      <span class="highlight">Under</span>
      <span>Maintenance</span>
    </h1>

    <div class="sub-message">
      <i class="fas fa-tools" style="margin-right: 8px; opacity: 0.7;"></i> 
      we'll be back soon
    </div>

    <p class="description">
      We're currently updating our site to serve you better. 
      Our team is working hard to bring you a fresh experience.
    </p>

    <!-- status badge -->
    <div class="status-badge">
      <i class="fas fa-circle" style="font-size: 0.6rem;"></i> 
      Status: under maintenance
      <span style="margin: 0 4px;">·</span>
      <i class="fas fa-clock" style="opacity: 0.7;"></i> ETA 2h
    </div>

    <!-- animated dots (progress vibe) -->
    <div class="progress-track">
      <span class="progress-dot active"></span>
      <span class="progress-dot active"></span>
      <span class="progress-dot active"></span>
      <span class="progress-dot"></span>
      <span class="progress-dot"></span>
    </div>

  </div>
</body>
</html>
