<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ loading · #10 wave</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: #0f1724;
      background-image: radial-gradient(circle at 30% 40%, #1d2b3f 0%, #0a111c 90%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      margin: 0;
    }

    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    /* card – only one, clean & focused */
    .card {
      background: rgba(20, 32, 48, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 3.5rem;
      padding: 3rem 2.5rem 2.8rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 30px 50px -16px #000000b0, 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 40px 60px -18px #000000cc, 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
    }

    /* header inside card */
    .rank {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    .rank-number {
      background: rgba(251, 191, 36, 0.1);
      border-radius: 60px;
      padding: 0.3rem 1.4rem 0.3rem 1.2rem;
      font-weight: 600;
      font-size: 1rem;
      color: #fcd34d;
      border: 1px solid rgba(251, 191, 36, 0.08);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rank-number i {
      font-size: 0.85rem;
      color: #fbbf24;
    }

    .rank-badge {
      background: rgba(255, 255, 255, 0.04);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rank-badge i {
      color: #60a5fa;
    }

    /* preview area – #10 loader */
    .preview {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 2.2rem;
      padding: 2.2rem 1rem;
      margin: 0.8rem 0 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 130px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(4px);
    }

    /* ===== #10: typing wave (dots + label) ===== */
    .load-10 {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .load-10 .typing {
      display: flex;
      gap: 10px;
    }

    .load-10 .typing span {
      width: 18px;
      height: 18px;
      background: #60a5fa;
      border-radius: 50%;
      animation: wave 1.2s infinite ease-in-out;
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
    }

    .load-10 .typing span:nth-child(2) { animation-delay: 0.15s; background: #818cf8; }
    .load-10 .typing span:nth-child(3) { animation-delay: 0.3s; background: #a78bfa; }
    .load-10 .typing span:nth-child(4) { animation-delay: 0.45s; background: #c084fc; }
    .load-10 .typing span:nth-child(5) { animation-delay: 0.6s; background: #e879f9; }

    .load-10 .label {
      color: #cbd5e1;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      font-weight: 300;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .load-10 .label i {
      margin-right: 6px;
      color: #fbbf24;
      font-size: 0.9rem;
    }

    /* animation */
    @keyframes wave {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-18px); }
    }

    /* footer / info */
    .card-footer {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 1.6rem;
      color: #64748b;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }

    .card-footer .tag {
      background: rgba(255, 255, 255, 0.02);
      padding: 0.2rem 1.4rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-footer .tag i {
      color: #fbbf24;
      opacity: 0.6;
    }

    .card-footer .redirect-info {
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.02);
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.02);
    }

    .card-footer .redirect-info i {
      color: #60a5fa;
    }

    .card-footer .redirect-info a {
      color: #94a3b8;
      text-decoration: none;
      font-weight: 400;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      transition: color 0.2s;
    }

    .card-footer .redirect-info a:hover {
      color: #fbbf24;
      border-bottom-color: #fbbf24;
    }

    /* tiny extra */
    .sub-note {
      color: #4a5a72;
      font-size: 0.75rem;
      letter-spacing: 0.3px;
      margin-top: 0.5rem;
    }

    .sub-note i {
      color: #fbbf24;
      opacity: 0.4;
      margin: 0 4px;
    }

    /* responsive */
    @media (max-width: 550px) {
      .card { padding: 2rem 1.2rem; }
      .load-10 .typing span { width: 14px; height: 14px; }
      .load-10 .label { font-size: 0.95rem; padding: 0.2rem 1rem; }
      .card-footer { flex-direction: column; gap: 0.6rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- single card : #10 loader + redirect -->
  <div class="card">

    <!-- preview: #10 loader (exactly as in original, polished) -->
    <div class="preview">
      <div class="load-10">
        <div class="typing">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        
		</div>
    </div>


    <!-- subtle note: redirect after 3s -->
    <div class="sub-note">
      <i class="fas fa-sync-alt fa-fw"></i> redirecting in 3s …
    </div>
  </div>
</div>

<script>
  (function() {
    // target URL
    const TARGET_URL = 'https://cieverosecollege.gnomio.com/';

    // get the link element (optional, but we update href for consistency)
    const linkEl = document.getElementById('redirectLink');
    if (linkEl) {
      linkEl.href = TARGET_URL;
      linkEl.target = '_blank';  // open in new tab, but we also auto-redirect
      linkEl.textContent = 'cieverosecollege.gnomio.com';
    }

    // Auto‑redirect after 3 seconds
    setTimeout(function() {
      window.location.href = TARGET_URL;
    }, 3000); // 3000ms = 3s

    // (optional) if user clicks on the link, we don't interfere,
    // but we also want the link to work normally.
    // All good.
  })();
</script>

<!-- small note: the link is clickable, and auto-redirect happens -->
</body>
</html>
